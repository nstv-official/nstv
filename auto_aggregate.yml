name: NSTV Advanced Aggregator

on:
  schedule:
    - cron: '0 1 * * *' # Berjalan setiap hari jam 1 pagi
  workflow_dispatch:

jobs:
  aggregate-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run aggregator script
        run: python nstv_aggregator.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add playlist.json
          git commit -m "Auto-Aggregate: Repaired dead links and added new channels" || echo "No changes to commit"
          git push
