name: Auto Update IPTV Playlist

on:
  schedule:
    # Menjadwalkan skrip berjalan otomatis setiap 6 jam (bisa disesuaikan)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Fitur tombol "Run workflow" agar Anda bisa menjalankan manual kapan saja via web GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Mengambil kode dari repositori Anda
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Menyiapkan lingkungan Python di server GitHub
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Memasang pustaka 'requests' yang dibutuhkan skrip Anda
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 4. Menjalankan skrip Python utama Anda
    - name: Run Validation Script
      run: python parse_and_validate.py

        # 5. Otomatis menyimpan (commit & push) file data samaran yang baru ke repositori
    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Mengompilasi/menambahkan file samaran Anda, bukan playlist.json lagi
        git add system_config_v3.data
        
        # Mengecek apakah ada perubahan data. Jika ada, sistem akan melakukan commit & push otomatis.
        git diff --quiet && git diff --staged --quiet || (git commit -m "System: Sync configuration data [Bot]" && git push)
