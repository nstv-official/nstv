name: Auto Update Playlist NSTV

on:
  schedule:
    - cron: '0 */48 * * *' # Jalan otomatis tiap 2 Hari
  workflow_dispatch:      # Bisa diklik manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Scraper Script
        run: python parse_and_validate.py  # <--- Nama file master

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .system_config_v1.data
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update playlist: $(date)"
          git push
